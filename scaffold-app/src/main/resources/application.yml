server:
  port: 8090

spring:
  application:
    name: scaffold-app
  
  # 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5432/scaffold_db
    username: scaffold_user
    password: Scaffold@2026
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 认证配置
scaffold:
  auth:
    jwt:
      secret: scaffold-project-jwt-secret-key-2026-very-long-secret
      expire: 7200
    session:
      enabled: true
      timeout: 86400
      single-login: false
    exclude-paths:
      - /api/auth/login
      - /api/auth/pre-login
      - /doc.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /favicon.ico
      - /error

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn
